{% extends "layout.html" %}
{% block title %}Abrir Turno de Caja{% endblock %}
{% block body %}
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h4 class="mb-0">Abrir Turno de Caja</h4>
                    </div>
                    <div class="card-body">
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="opening_amount" class="form-label">Monto de Apertura (C$)</label>
                                <input type="number"
                                       class="form-control"
                                       id="opening_amount"
                                       name="opening_amount"
                                       step="0.01"
                                       min="0"
                                       value="0"
                                       required>
                                <div class="form-text">Ingrese el efectivo que tiene en caja al iniciar el turno.</div>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-success">
                                    <i class="material-icons">lock_open</i> Abrir Turno
                                </button>
                                <a href="{% url 'cash_register_list' %}" class="btn btn-secondary">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
